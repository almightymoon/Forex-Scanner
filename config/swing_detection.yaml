# Swing Detection Engine — all thresholds live here (no magic numbers in code).

pivot:
  left_lookback: 3
  right_lookback: 3
  allow_equal_levels: false          # v1.0.0 strict; v1.1.0 enables tolerant equal highs/lows
  equal_level_tolerance_pips: 1.5
  min_separation_bars: 1
  min_pivot_strength: 0.0            # 0 = disabled; reject pivots below this 0-100 score
  use_body_extreme: false            # use max(open,close) / min(open,close) instead of wick

noise_filter:
  min_candle_distance: 2
  min_pip_distance: 2.0
  min_atr_multiple: 0.25
  dedupe_equal_levels: true
  equal_level_tolerance_pips: 1.5
  ignore_consecutive_same_direction: true
  spread_filter_enabled: false
  max_spread_atr_ratio: 0.35
  volatility_filter_enabled: false
  min_volatility_atr: 0.0005
  consolidation_max_bars: 0          # 0 = disabled
  insignificant_pullback_atr: 0.0

atr:
  period: 14
  validation_multiplier: 0.35

leg:
  min_pips: 2.0
  min_atr_multiple: 0.35
  validate_same_direction: false     # v1.1.0: apply leg filter to same-direction pivots

confirmation:
  min_candles: 2
  delay_bars: 2
  require_structure_break: false
  required_retracement_atr: 0.0
  displacement_atr_min: 0.0
  displacement_bars: 1
  break_internal_structure: false

strength:
  weights:
    leg_size: 0.20
    atr_multiple: 0.15
    reaction_size: 0.15
    duration: 0.10
    volume: 0.10
    wick_ratio: 0.10
    displacement: 0.10
    trend_quality: 0.10
  level_thresholds: [20, 40, 60, 80]
  reaction_bars: 4
  duration_cap: 20
  leg_atr_divisor: 2.5
  atr_divisor: 2.0
  reaction_divisor: 1.5
  displacement_divisor: 2.0
  normalized_max: 100.0

classification:
  major_min_atr_multiple: 1.2
  major_min_strength: 4
  minor_max_atr_multiple: 1.2
  external_score_threshold: 0.6
  internal_score_threshold: -0.25
  protected_lookback_swings: 3
  tier_weights:
    leg_atr: 0.35
    strength: 0.25
    reaction: 0.15
    confirmation: 0.15
    duration: 0.10

confidence:
  confirmed_bonus: 0.15
  unconfirmed_penalty: 0.6
  major_multiplier: 1.1
  delay_penalty_per_bar: 0.02

pip_size:
  default: 0.0001
  jpy: 0.01
  jpy_symbols:
    - USDJPY
    - EURJPY
    - GBPJPY
    - AUDJPY
    - NZDJPY
    - CADJPY
    - CHFJPY
  # Per-symbol pip overrides (metals, indices). XAUUSD gold pip = 0.1.
  symbol_overrides:
    XAUUSD: 0.1
    XAGUSD: 0.001
    XAUEUR: 0.1

# Sprint 3 — adaptive detection. Disabled at base; enabled in the 1.2.0 profile.
adaptive:
  enabled: false
  atr_percentile_window: 100
  high_volatility_percentile: 75.0
  low_volatility_percentile: 25.0
  trending_efficiency_min: 0.35     # Kaufman efficiency ratio threshold
  efficiency_window: 20
  session_enabled: true
  # Scaling factors applied to thresholds by regime/session
  high_vol_pip_distance_mult: 1.3
  high_vol_major_atr_mult: 1.15
  low_vol_pip_distance_mult: 0.8
  low_vol_min_atr_mult: 0.85
  ranging_leg_atr_mult: 1.2
  ranging_pivot_strength_add: 4.0
  trending_leg_atr_mult: 0.9
  asia_min_pip_mult: 1.25
  asia_delay_add: 1
  overlap_min_pip_mult: 0.9
  wide_spread_atr_ratio: 0.5

# Sprint 3 — swing quality score (0-100). Downstream modules gate on this.
quality:
  weights:
    confirmation: 0.20
    displacement: 0.15
    wick: 0.10
    atr_normalization: 0.15
    leg_symmetry: 0.15
    liquidity_sweep: 0.10
    trend_alignment: 0.15
  min_acceptable: 50.0               # advisory threshold for downstream filtering
  sweep_lookback_bars: 10
  sweep_penetration_atr: 0.1

# Sprint 5 — score-gated confirmation (v1.4.0). Soft rules become weighted factors.
confirmation_score:
  enabled: false
  threshold: 72.0
  weights:
    hold_quality: 0.15
    atr_reaction: 0.15
    displacement: 0.12
    wick: 0.08
    structure_break: 0.12
    trend_alignment: 0.12
    liquidity_sweep: 0.08
    volume: 0.08
    mtf_alignment: 0.10

evaluation:
  price_match_tolerance_pips: 2.0
  index_match_tolerance_bars: 2
  min_f1_regression: 0.90

# Per-engine-version config overrides (merged on top of base + timeframe)
version_profiles:
  "1.1.0":
    pivot:
      allow_equal_levels: true
      min_pivot_strength: 8.0
    noise_filter:
      volatility_filter_enabled: true
      insignificant_pullback_atr: 0.20
    leg:
      validate_same_direction: true
    confirmation:
      displacement_atr_min: 0.15
      break_internal_structure: false
    classification:
      protected_lookback_swings: 4
  "1.2.0":
    pivot:
      allow_equal_levels: true
      min_pivot_strength: 8.0
    noise_filter:
      volatility_filter_enabled: true
      insignificant_pullback_atr: 0.20
    leg:
      validate_same_direction: true
    confirmation:
      displacement_atr_min: 0.15
      break_internal_structure: false
    classification:
      protected_lookback_swings: 4
    adaptive:
      enabled: true
  "1.3.0":
    pivot:
      allow_equal_levels: true
      min_pivot_strength: 8.0
    noise_filter:
      volatility_filter_enabled: true
      insignificant_pullback_atr: 0.20
    leg:
      validate_same_direction: true
    confirmation:
      displacement_atr_min: 0.15
      break_internal_structure: false
    classification:
      protected_lookback_swings: 4
    adaptive:
      enabled: true
  "1.4.0":
    pivot:
      allow_equal_levels: true
      min_pivot_strength: 8.0
    noise_filter:
      volatility_filter_enabled: true
      insignificant_pullback_atr: 0.20
    leg:
      validate_same_direction: true
    confirmation:
      displacement_atr_min: 0.0
      break_internal_structure: false
    confirmation_score:
      enabled: true
      threshold: 70.0
    classification:
      protected_lookback_swings: 4
    adaptive:
      enabled: true
  "2.0.0":
    pivot:
      allow_equal_levels: true
      min_pivot_strength: 8.0
    noise_filter:
      volatility_filter_enabled: true
      insignificant_pullback_atr: 0.20
    leg:
      validate_same_direction: true
    confirmation:
      displacement_atr_min: 0.0
      break_internal_structure: false
    confirmation_score:
      enabled: true
      threshold: 70.0
    classification:
      protected_lookback_swings: 4
    adaptive:
      enabled: true

# Per-symbol overrides (merged after version + timeframe). Gold trades wider.
symbol_overrides:
  XAUUSD:
    noise_filter:
      min_pip_distance: 5.0
    leg:
      min_pips: 5.0
    adaptive:
      wide_spread_atr_ratio: 0.6

timeframe_overrides:
  M1:
    pivot:
      left_lookback: 2
      right_lookback: 2
    confirmation:
      min_candles: 2
      delay_bars: 2
  M5:
    pivot:
      left_lookback: 2
      right_lookback: 2
  H1:
    pivot:
      left_lookback: 3
      right_lookback: 3
    confirmation:
      min_candles: 3
      delay_bars: 3
  H4:
    pivot:
      left_lookback: 4
      right_lookback: 4
  D1:
    pivot:
      left_lookback: 5
      right_lookback: 5
    confirmation:
      min_candles: 4
      delay_bars: 4
